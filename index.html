<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hearts"></div>

<section class="page active" id="page1">
    <h1>Привет ❤️</h1>
    <p>У меня есть кое-что важное для тебя...</p>
    <button onclick="nextPage()">Дальше ➜</button>
</section>

<section class="page" id="page2">
    <h1>Я хотел сказать...</h1>
    <p class="typing">
        Ты стала человеком, о котором я думаю каждый день.
        С тобой хочется смеяться, гулять и проводить время.
        ❤️
    </p>
    <button onclick="nextPage()">Еще ➜</button>
</section>

<section class="page" id="page3">
    <h1>И самое главное...</h1>

    <p class="question">
        💖 Хочешь поиграть со мной? 💖
    </p>

    <div class="buttons">
        <button class="yes" onclick="yesAnswer()">Да ❤️</button>
        <button class="no" id="noBtn">Нет 😅</button>
    </div>
</section>

<div id="success">
    <h1>🥹❤️ Ура!!! ❤️🥹</h1>
    <p>Ты сделала меня самым счастливым человеком!</p>
    <div class="big-heart">💖</div>
</div>

<script src="script.js"></script>

</body>
</html>
